<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Learskool Kensington Class of 2016</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
<header class="hero">
<h1>🎓 Learskool Kensington Class of 2016</h1>
<p>Living Digital Reunion Yearbook</p>
</header>
<div class="container">
<form id="profileForm" class="card">
<h2>Add Your Profile</h2>
<input id="fullName" placeholder="Full Name" required>
<input id="nickname" placeholder="Nickname">
<input id="location" placeholder="Where do you live now?">
<input id="occupation" placeholder="What are you doing now?">
<input id="instagram" placeholder="Instagram URL">
<input id="photo" type="file" accept="image/*">
<textarea id="memory" placeholder="Favourite memory"></textarea>
<textarea id="funnyStory" placeholder="Funny story"></textarea>
<input id="song" placeholder="Favourite primary school song">
<input id="dream" placeholder="Dream for the next 10 years">
<button type="submit">Join Yearbook</button>
</form>
<input id="search" placeholder="Search classmates...">
<div id="profiles" class="profiles"></div>
</div>
<script src="script.js"></script>
</body>
</html>
